name = "quieto-mcp"
main = "src/worker.ts"
compatibility_date = "2025-04-29"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "quieto.dev/sse", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "QuietoMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuietoMCP"]

[observability]
enabled = true
